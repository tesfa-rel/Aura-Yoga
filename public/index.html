<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- Cross-platform Favicons -->
    <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon.svg" />
    <link rel="icon" type="image/png" href="%PUBLIC_URL%/favicon-96x96.png" sizes="96x96" />
    <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/apple-touch-icon.png" />
    <link rel="manifest" href="%PUBLIC_URL%/site.webmanifest" />

    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#d946ef" />
    <meta name="description" content="AURA Yoga - Women-only Yoga & Pilates Studio. Book classes, manage packages, and track your yoga journey." />
    <meta name="keywords" content="yoga, pilates, women-only, fitness, wellness, studio, classes, booking" />
    <meta name="author" content="AURA Yoga Studio" />

    <!-- PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AURA Yoga" />
    <meta name="application-name" content="AURA Yoga" />
    <meta name="msapplication-TileColor" content="#d946ef" />

    <!-- Preconnect to API for performance -->
    <link rel="preconnect" href="http://localhost:5000" />

    <!-- Open Graph Tags -->
    <meta property="og:title" content="AURA Yoga Studio" />
    <meta property="og:description" content="Women-only yoga and pilates studio. Book classes and manage your wellness journey." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="%PUBLIC_URL%/apple-touch-icon.png" />

    <!-- Twitter Card Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AURA Yoga Studio" />
    <meta name="twitter:description" content="Women-only yoga and pilates studio. Book classes and manage your wellness journey." />
    <meta name="twitter:image" content="%PUBLIC_URL%/apple-touch-icon.png" />
    
    <!-- Google Fonts for Landing Page -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />

    <title>AURA Yoga Studio - Women's Yoga & Pilates</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    
    <!-- PWA Install Prompt Placeholder -->
    <div id="pwa-install-prompt"></div>
    
    <!-- Network Status Indicator -->
    <div id="network-status"></div>
  </body>
</html>
